# ─── Forjit AI · Daily Blog Post Generator ───────────────────────────────────
#
#  ⚠️  FIRST-TIME SETUP (one-time, takes 2 minutes):
#  1. Go to console.groq.com → sign up free → API Keys → Create Key
#  2. Copy the key (starts with gsk_...)
#  3. This GitHub repo → Settings → Secrets and variables → Actions
#  4. New repository secret → Name: GROQ_API_KEY → paste key → Save
#  Done! Runs automatically every morning at 6 AM IST.
#
#  Security: key lives ONLY in GitHub's encrypted vault, never in code.
# ─────────────────────────────────────────────────────────────────────────────

name: Daily Blog Post

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST daily
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

jobs:
  generate-post:
    name: Generate Blog Post
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate secrets
        id: check
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::GROQ_API_KEY not set. Go to: repo → Settings → Secrets → Actions → New secret → Name: GROQ_API_KEY → Value: your key from console.groq.com"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ GROQ_API_KEY is configured"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Generate blog post
        if: steps.check.outputs.skip == 'false'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-blog-post.js

      - name: Check output & update manifest
        if: steps.check.outputs.skip == 'false'
        id: post
        run: |
          TODAY=$(date +%Y-%m-%d)
          if ls public/blog/posts/${TODAY}*.json 1>/dev/null 2>&1; then
            echo "created=true" >> $GITHUB_OUTPUT
            node scripts/gen-tools.js
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "::warning::No post file generated for $TODAY"
          fi

      - name: Commit and push
        if: steps.post.outputs.created == 'true'
        run: |
          git config user.name "Forjit AI Bot"
          git config user.email "forjitai@gmail.com"
          git add public/blog/ public/sitemap.xml
          git diff --staged --quiet || git commit -m "📝 Blog post $(date +%Y-%m-%d) [auto]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        run: |
          echo "## Blog Post Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "⚠️ **Skipped** — GROQ_API_KEY secret missing." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**One-time fix:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Get free key at [console.groq.com](https://console.groq.com)" >> $GITHUB_STEP_SUMMARY
            echo "2. Repo → Settings → Secrets → Actions → New secret" >> $GITHUB_STEP_SUMMARY
            echo "3. Name: \`GROQ_API_KEY\` → paste key → Save" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.post.outputs.created }}" = "true" ]; then
            echo "✅ **Published** — $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Failed** — see logs" >> $GITHUB_STEP_SUMMARY
          fi
