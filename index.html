    <!-- Register Service Worker for PWA — with update detection -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              // Check for updates every 60 seconds
              setInterval(() => reg.update(), 60000);

              // When a new SW is waiting — show toast
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    showUpdateToast(newWorker);
                  }
                });
              });
            })
            .catch(() => {});

          // If controller changed — page was updated, reload
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) { refreshing = true; window.location.reload(); }
          });
        });
      }

      function showUpdateToast(worker) {
        const toast = document.createElement('div');
        toast.id = 'update-toast';
        toast.style.cssText = [
          'position:fixed','bottom:24px','left:50%','transform:translateX(-50%)',
          'background:#1c1917','border:1px solid #fbbf24','border-radius:10px',
          'padding:12px 20px','display:flex','align-items:center','gap:12px',
          'font-family:system-ui,sans-serif','font-size:14px','color:#e7e5e4',
          'z-index:99999','box-shadow:0 8px 32px rgba(0,0,0,.6)',
          'max-width:340px','animation:slideUp .3s ease'
        ].join(';');
        toast.innerHTML = [
          '<style>@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}</style>',
          '<span style="font-size:18px">🆕</span>',
          '<span><b>New version available!</b><br><span style="font-size:12px;color:#a8a29e">Forjit AI has been updated.</span></span>',
          '<button onclick="applyUpdate()" style="background:#fbbf24;color:#0c0a09;border:none;padding:7px 14px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap">Update Now</button>',
          '<button onclick="this.parentElement.remove()" style="background:none;border:none;color:#78716c;font-size:18px;cursor:pointer;padding:0 2px">×</button>'
        ].join('');
        document.body.appendChild(toast);
        window._pendingWorker = worker;
      }

      function applyUpdate() {
        if (window._pendingWorker) {
          window._pendingWorker.postMessage('SKIP_WAITING');
        }
        document.getElementById('update-toast')?.remove();
      }
    </script>
