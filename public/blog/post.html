<script>
/* ── Lightweight markdown renderer ───────────────────────────────────────── */
function mdToHtml(md) {
  if (!md) return '';
  let h = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks
  h = h.replace(/```[\s\S]*?```/g, m => {
    const code = m.replace(/^```[^\n]*\n?/,'').replace(/\n?```$/,'');
    return `<pre><code>${code}</code></pre>`;
  });
  // Tables
  h = h.replace(/^\|(.+)\|\s*\n\|[-:| ]+\|\s*\n((?:\|.+\|\s*\n?)+)/gm, (_, header, rows) => {
    const ths = header.split('|').map(c=>c.trim()).filter(Boolean).map(c=>`<th>${c}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').slice(1,-1).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  // HR
  h = h.replace(/^---+$/gm, '<hr>');
  // Headings
  h = h.replace(/^###### (.+)$/gm,'<h6>$1</h6>')
       .replace(/^##### (.+)$/gm,'<h5>$1</h5>')
       .replace(/^#### (.+)$/gm,'<h4>$1</h4>')
       .replace(/^### (.+)$/gm,'<h3>$1</h3>')
       .replace(/^## (.+)$/gm,'<h2>$1</h2>')
       .replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Blockquotes
  h = h.replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>');
  // Inline
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/\*(.+?)\*/g,'<em>$1</em>')
       .replace(/`([^`]+)`/g,'<code>$1</code>')
       .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  // Lists
  h = h.replace(/^(\s*)[*+-] (.+)$/gm,'$1<li>$2</li>');
  h = h.replace(/^(\s*)\d+\. (.+)$/gm,'$1<li>$2</li>');
  h = h.replace(/(<li>[\s\S]*?<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`);
  // Paragraphs
  h = h.split(/\n\n+/).map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<(h[1-6]|ul|ol|pre|table|blockquote|hr)/i.test(block)) return block;
    return `<p>${block.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');
  return h;
}

/* ── Load and render post ────────────────────────────────────────────────── */
async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  const date = params.get('date');
  const slug = params.get('slug');

  if (!date) {
    document.getElementById('postContent').innerHTML =
      '<div class="error">No post specified. <a href="/blog/">← Back to blog</a></div>';
    return;
  }

  try {
    const res = await fetch(`/blog/posts/${date}.json`);
    if (!res.ok) throw new Error('Post not found');
    const post = await res.json();

    // Update page meta
    const postUrl = `https://www.forjitai.in/blog/post.html?date=${date}&slug=${post.slug}`;
    document.getElementById('pageTitle').textContent = `${post.title} — Forjit AI`;
    document.getElementById('pageMeta').content      = post.summary || post.title;
    document.getElementById('breadTitle').textContent = post.title;
    document.getElementById('pageCanonical').href    = postUrl;
    // og tags
    document.getElementById('ogUrl').content    = postUrl;
    document.getElementById('ogTitle').content  = `${post.title} — Forjit AI`;
    document.getElementById('ogDesc').content   = post.summary || post.title;
    // twitter tags
    document.getElementById('twTitle').content  = `${post.title} — Forjit AI`;
    document.getElementById('twDesc').content   = post.summary || post.title;

    // Determine if AI-generated
    const aiGenerated = post.generated === true;

    const dateFormatted = new Date(post.date).toLocaleDateString('en-IN', {
      day: 'numeric', month: 'long', year: 'numeric',
    });

    document.getElementById('postContent').innerHTML = `
      <span class="post-cat">${post.category}</span>
      <h1>${post.title}</h1>
      <div class="meta">
        <span>${dateFormatted}</span>
        ${(post.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
        ${aiGenerated ? '<span class="tag" style="border-color:rgba(251,191,36,.3);color:#fbbf24">AI-generated</span>' : ''}
      </div>

      ${aiGenerated ? `
        <div class="ai-notice">
          <strong>⚠ AI-Generated Content — Important Notice</strong><br/>
          This article was automatically created by an AI language model (${post.model || 'Llama 3.3 70B'}) and has not been manually reviewed.<br/>
          <strong>Do not make financial, tax, medical, or legal decisions based on this content alone.</strong>
          Always verify with a qualified Chartered Accountant (CA), SEBI-registered financial advisor,
          or registered medical professional as appropriate.
          Facts, figures, and regulations mentioned should be independently confirmed —
          they may be outdated or inaccurate.
          <br/>
          <a href="/terms" style="color:var(--ac)">Terms of Service</a> ·
          <a href="/privacy" style="color:var(--ac)">Privacy Policy</a>
        </div>` : ''}

      <div class="ad">Advertisement</div>

      <div class="content">${mdToHtml(post.content)}</div>

      <div class="ad" style="margin-top:24px">Advertisement</div>

      <div class="share-bar">
        <button class="share-btn" onclick="copyLink()">🔗 Copy Link</button>
        <a class="share-btn" style="text-decoration:none"
          href="https://wa.me/?text=${encodeURIComponent(post.title + ' — ' + window.location.href)}"
          target="_blank" rel="noreferrer">
          💬 Share on WhatsApp
        </a>
        <a class="share-btn" style="text-decoration:none"
          href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}"
          target="_blank" rel="noreferrer">
          💼 LinkedIn
        </a>
      </div>

      <div class="related">
        <h3>Explore Free Tools</h3>
        <div class="related-grid">
          <a class="related-card" href="/tools/emi-calculator.html">
            <div class="related-card-cat">Finance</div>
            <div class="related-card-title">🏦 EMI Calculator with Prepayment Impact</div>
          </a>
          <a class="related-card" href="/tools/income-tax-calculator.html">
            <div class="related-card-cat">India</div>
            <div class="related-card-title">📋 Income Tax Calculator FY 2025-26</div>
          </a>
          <a class="related-card" href="/tools/sip-calculator.html">
            <div class="related-card-cat">Finance</div>
            <div class="related-card-title">📈 SIP & Goal Calculator</div>
          </a>
          <a class="related-card" href="/tools/">
            <div class="related-card-cat">All Tools</div>
            <div class="related-card-title">🔧 View All 41+ Free Tools →</div>
          </a>
        </div>
      </div>
    `;

    // Add Article schema
    const schema = {
      '@context': 'https://schema.org',
      '@type': 'Article',
      headline: post.title,
      description: post.summary,
      datePublished: post.date,
      dateModified: post.date,
      author: { '@type': 'Organization', name: 'Forjit AI' },
      publisher: {
        '@type': 'Organization',
        name: 'Forjit AI',
        logo: { '@type': 'ImageObject', url: 'https://www.forjitai.in/icons/icon-192.png' },
      },
      mainEntityOfPage: window.location.href,
    };
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.textContent = JSON.stringify(schema);
    document.head.appendChild(s);

  } catch (e) {
    document.getElementById('postContent').innerHTML =
      `<div class="error">Could not load this post.<br>${e.message}<br><br><a href="/blog/">← Back to blog</a></div>`;
  }
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href)
    .then(() => { event.target.textContent = '✓ Copied!'; setTimeout(() => event.target.textContent = '🔗 Copy Link', 1800); });
}

loadPost();
</script>
