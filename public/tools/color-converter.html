<script>
const NAMED=['#FF0000 Red','#FF4500 OrangeRed','#FF8C00 DarkOrange','#FFA500 Orange','#FFD700 Gold','#FFFF00 Yellow','#ADFF2F GreenYellow','#00FF00 Lime','#00FA9A MediumSpring','#00FFFF Cyan','#00CED1 DarkTurquoise','#0000FF Blue','#4169E1 RoyalBlue','#8A2BE2 BlueViolet','#FF00FF Magenta','#FF1493 DeepPink','#C0C0C0 Silver','#808080 Gray','#000000 Black','#FFFFFF White','#F5F5DC Beige','#FFB6C1 LightPink','#DEB887 BurlyWood','#20B2AA LightSeaGreen','#3b82f6 SkyBlue','#22c55e Emerald','#ef4444 Crimson','#f59e0b Amber','#8b5cf6 Violet','#ec4899 Pink'];

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];}
function rgbToHex(r,g,b){return'#'+(r*65536+g*256+b).toString(16).padStart(6,'0').toUpperCase();}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0;}else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;}}return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];}
function rgbToCmyk(r,g,b){r/=255;g/=255;b/=255;const k=1-Math.max(r,g,b);if(k===1)return[0,0,0,100];return[Math.round((1-r-k)/(1-k)*100),Math.round((1-g-k)/(1-k)*100),Math.round((1-b-k)/(1-k)*100),Math.round(k*100)];}
function getLuma(r,g,b){return (0.299*r+0.587*g+0.114*b)/255;}

function fromHex(hex){
  if(!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  const[r,g,b]=hexToRgb(hex);
  document.getElementById('sR').value=r;document.getElementById('lR').textContent=r;
  document.getElementById('sG').value=g;document.getElementById('lG').textContent=g;
  document.getElementById('sB').value=b;document.getElementById('lB').textContent=b;
  document.getElementById('picker').value=hex.toLowerCase();
  document.getElementById('hexInput').value=hex.replace('#','').toUpperCase();
  updateAll(r,g,b);
}

function fromRGB(){
  const r=+document.getElementById('sR').value,g=+document.getElementById('sG').value,b=+document.getElementById('sB').value;
  document.getElementById('lR').textContent=r;document.getElementById('lG').textContent=g;document.getElementById('lB').textContent=b;
  const hex=rgbToHex(r,g,b);
  document.getElementById('picker').value=hex.toLowerCase();
  document.getElementById('hexInput').value=hex.replace('#','');
  updateAll(r,g,b);
}

function updateAll(r,g,b){
  const hex=rgbToHex(r,g,b);
  const[h,s,l]=rgbToHsl(r,g,b);
  const[c,m,y,k]=rgbToCmyk(r,g,b);
  const luma=getLuma(r,g,b);
  const tc=luma>.5?'#000':'#fff';
  document.getElementById('preview').style.background=hex;
  document.getElementById('preview').style.color=tc;
  document.getElementById('previewText').textContent=hex;
  const fmts=[['HEX',hex],['RGB',`rgb(${r}, ${g}, ${b})`],['RGB (0-1)',`rgb(${(r/255).toFixed(3)}, ${(g/255).toFixed(3)}, ${(b/255).toFixed(3)})`],['HSL',`hsl(${h}, ${s}%, ${l}%)`],['CMYK',`cmyk(${c}%, ${m}%, ${y}%, ${k}%)`],['Luminance',luma.toFixed(4)]];
  document.getElementById('formats').innerHTML=fmts.map(([label,val])=>`<div class="format-row" onclick="copy('${val}')" title="Click to copy"><span class="format-label">${label}</span><span class="format-val">${val}</span><button class="copy-btn">Copy</button></div>`).join('');
  // Shades
  const swatches=[];
  for(let i=9;i>=1;i--){const f=i/10;swatches.push(`hsl(${h},${s}%,${Math.round(f*90+5)}%)`);}
  document.getElementById('swatches').innerHTML=swatches.map(c=>`<div class="swatch" style="background:${c}" onclick="fromHex(hslToHex('${c}'))" title="${c}"></div>`).join('');
}

function hslToHex(hslStr){
  const[h,s,l]=hslStr.match(/\d+(\.\d+)?/g).map(Number);
  const a=s/100*Math.min(l/100,1-l/100);
  const f=n=>{const k=(n+h/30)%12;const color=l/100-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*color).toString(16).padStart(2,'0');};
  return '#'+f(0)+f(8)+f(4);
}

function copy(val){navigator.clipboard.writeText(val);event.target.textContent='✓';setTimeout(()=>{try{event.target.textContent='Copy';}catch{}},1500);}

// Named colors
document.getElementById('namedColors').innerHTML=NAMED.map(nc=>{const[hex,...nameParts]=nc.split(' ');const name=nameParts.join(' ');return`<div class="nc" style="background:${hex};color:${hex==='#FFFFFF'?'#000':'#fff'}" onclick="fromHex('${hex}')" title="${hex}"><span style="text-shadow:0 1px 2px rgba(0,0,0,.5)">${name}</span></div>`;}).join('');

fromHex('#3b82f6');
</script>
