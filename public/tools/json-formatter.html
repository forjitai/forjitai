<script>
function syntaxHighlight(json){
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,function(match){
    let cls='number';
    if(/^"/.test(match)){cls=/:$/.test(match)?'key':'string';}
    else if(/true|false/.test(match)){cls='bool';}
    else if(/null/.test(match)){cls='null-val';}
    return`<span class="${cls}">${match}</span>`;
  });
}

function getIndent(){const v=document.getElementById('indent').value;return v==='1'?'\t':' '.repeat(parseInt(v));}

function parse(){try{return{ok:true,data:JSON.parse(document.getElementById('input').value)};}catch(e){return{ok:false,error:e.message};}}

function onInput(){
  const r=parse();
  const inp=document.getElementById('input');
  const stat=document.getElementById('inputStatus');
  if(document.getElementById('input').value.trim()===''){inp.className='editor';stat.textContent='';document.getElementById('output').innerHTML='';return;}
  if(r.ok){inp.className='editor valid';stat.innerHTML='<span style="color:var(--green)">✓ Valid JSON</span>';updateStats(r.data);}
  else{inp.className='editor invalid';stat.innerHTML=`<span style="color:#f87171">✗ ${r.error}</span>`;}
}

function format(){
  const r=parse();
  if(!r.ok){alert('Invalid JSON: '+r.error);return;}
  const indent=getIndent();
  const formatted=JSON.stringify(r.data,null,indent);
  document.getElementById('output').innerHTML=syntaxHighlight(formatted.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  document.getElementById('outputStatus').textContent=formatted.length+' chars';
}

function minify(){
  const r=parse();
  if(!r.ok){alert('Invalid JSON: '+r.error);return;}
  const minified=JSON.stringify(r.data);
  document.getElementById('output').textContent=minified;
  document.getElementById('outputStatus').textContent=`Minified: ${minified.length} chars`;
}

function validate(){
  const r=parse();
  if(r.ok){alert('✅ Valid JSON!\n\nType: '+typeof r.data+(Array.isArray(r.data)?' (Array)':'')+'Keys: '+(typeof r.data==='object'&&r.data?Object.keys(r.data).length+' top-level keys':'N/A'));}
  else{alert('❌ Invalid JSON:\n\n'+r.error);}
}

function updateStats(data){
  let keys=0,vals=0,arrays=0,depth=0;
  function walk(obj,d=0){if(d>depth)depth=d;if(Array.isArray(obj)){arrays++;obj.forEach(v=>walk(v,d+1));}else if(typeof obj==='object'&&obj!==null){Object.entries(obj).forEach(([k,v])=>{keys++;vals++;walk(v,d+1);});}else vals++;}
  walk(data);
  document.getElementById('statKeys').textContent=keys;document.getElementById('statVals').textContent=vals;document.getElementById('statArr').textContent=arrays;document.getElementById('statDepth').textContent=depth;
}

function copyOutput(){navigator.clipboard.writeText(document.getElementById('output').textContent);}
function clearAll(){document.getElementById('input').value='';document.getElementById('output').innerHTML='';document.getElementById('input').className='editor';document.getElementById('inputStatus').textContent='';document.getElementById('outputStatus').textContent='';}
function loadSample(){
  document.getElementById('input').value=JSON.stringify({name:'Forjit AI',version:'2.0',features:['EMI Calculator','QR Generator','Word Counter'],stats:{tools:25,users:1000,rating:4.8},active:true,launched:null},null,2);
  onInput();format();
}
</script>
