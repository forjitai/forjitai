  <div class="calc">
    <div class="display">
      <div class="display-mode" id="modeDisp">DEG | Basic mode</div>
      <div class="display-expr" id="expr"></div>
      <div class="display-val" id="display">0</div>
    </div>

    <div class="btns">
      <!-- Row 1: mode + clear -->
      <button class="btn-calc btn-fn" onclick="toggleMode()">DEG/RAD</button>
      <button class="btn-calc btn-fn" onclick="inp('Math.PI')">π</button>
      <button class="btn-calc btn-fn" onclick="inp('Math.E')">e</button>
      <button class="btn-calc btn-clear" onclick="delLast()">⌫</button>
      <button class="btn-calc btn-clear" onclick="clear_all()">AC</button>
      <!-- Row 2: trig -->
      <button class="btn-calc btn-fn" onclick="fn('sin')">sin</button>
      <button class="btn-calc btn-fn" onclick="fn('cos')">cos</button>
      <button class="btn-calc btn-fn" onclick="fn('tan')">tan</button>
      <button class="btn-calc btn-fn" onclick="fn('log10')">log</button>
      <button class="btn-calc btn-fn" onclick="fn('ln')">ln</button>
      <!-- Row 3: powers -->
      <button class="btn-calc btn-fn" onclick="inp('^2')">x²</button>
      <button class="btn-calc btn-fn" onclick="inp('^')">xⁿ</button>
      <button class="btn-calc btn-fn" onclick="fn('sqrt')">√</button>
      <button class="btn-calc btn-fn" onclick="fn('fact')">n!</button>
      <button class="btn-calc btn-fn" onclick="inp('1/')">1/x</button>
      <!-- Row 4: nums -->
      <button class="btn-calc" onclick="inp('7')">7</button>
      <button class="btn-calc" onclick="inp('8')">8</button>
      <button class="btn-calc" onclick="inp('9')">9</button>
      <button class="btn-calc btn-op" onclick="inp('/')">÷</button>
      <button class="btn-calc btn-fn" onclick="inp('%')">%</button>
      <!-- Row 5 -->
      <button class="btn-calc" onclick="inp('4')">4</button>
      <button class="btn-calc" onclick="inp('5')">5</button>
      <button class="btn-calc" onclick="inp('6')">6</button>
      <button class="btn-calc btn-op" onclick="inp('*')">×</button>
      <button class="btn-calc btn-fn" onclick="inp('(')">(</button>
      <!-- Row 6 -->
      <button class="btn-calc" onclick="inp('1')">1</button>
      <button class="btn-calc" onclick="inp('2')">2</button>
      <button class="btn-calc" onclick="inp('3')">3</button>
      <button class="btn-calc btn-op" onclick="inp('-')">−</button>
      <button class="btn-calc btn-fn" onclick="inp(')')">)</button>
      <!-- Row 7 -->
      <button class="btn-calc" onclick="inp('0')">0</button>
      <button class="btn-calc" onclick="inp('.')">.</button>
      <button class="btn-calc btn-fn" onclick="inp('(-')">±</button>
      <button class="btn-calc btn-op" onclick="inp('+')">+</button>
      <button class="btn-calc btn-eq" onclick="evaluate()">=</button>
    </div>

    <!-- History -->
    <div class="history" id="histWrap" style="display:none">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">History</span>
        <button onclick="clearHist()" style="font-size:11px;background:none;border:none;color:var(--muted);cursor:pointer">Clear</button>
      </div>
      <div id="histItems"></div>
    </div>

<script>
let expr='',display='0',isRad=false,history=[];

function update(){
  document.getElementById('display').textContent=display||'0';
  document.getElementById('expr').textContent=expr;
  document.getElementById('modeDisp').textContent=(isRad?'RAD':'DEG')+' | Use keyboard too';
}

function inp(v){if(display==='Error')clear_all();if(display==='0'&&/^\d$/.test(v))display=v;else display+=v;update();}
function fn(f){if(display==='Error')clear_all();display=f+'('+display;update();}
function toggleMode(){isRad=!isRad;update();}
function clear_all(){display='0';expr='';update();}
function delLast(){if(display.length>1)display=display.slice(0,-1);else display='0';update();}

function evaluate(){
  try{
    let exp=display;
    // Handle ^ (power)
    exp=exp.replace(/\^/g,'**');
    // Handle implicit multiplication (2π etc)
    exp=exp.replace(/(\d)(Math\.)/g,'$1*$2');
    // Trig: wrap in deg conversion if DEG mode
    if(!isRad){
      exp=exp.replace(/sin\(/g,'Math.sin(Math.PI/180*');
      exp=exp.replace(/cos\(/g,'Math.cos(Math.PI/180*');
      exp=exp.replace(/tan\(/g,'Math.tan(Math.PI/180*');
      exp=exp.replace(/asin\(/g,'(180/Math.PI*Math.asin(');
      exp=exp.replace(/acos\(/g,'(180/Math.PI*Math.acos(');
      exp=exp.replace(/atan\(/g,'(180/Math.PI*Math.atan(');
    } else {
      exp=exp.replace(/sin\(/g,'Math.sin(');
      exp=exp.replace(/cos\(/g,'Math.cos(');
      exp=exp.replace(/tan\(/g,'Math.tan(');
    }
    exp=exp.replace(/sqrt\(/g,'Math.sqrt(');
    exp=exp.replace(/log10\(/g,'Math.log10(');
    exp=exp.replace(/ln\(/g,'Math.log(');
    exp=exp.replace(/abs\(/g,'Math.abs(');
    exp=exp.replace(/fact\((\d+)\)/g,(m,n)=>{let f=1;for(let i=2;i<=n;i++)f*=i;return f;});
    const result=Function('"use strict";return ('+exp+')')();
    expr=display+'=';
    const r=+parseFloat(result.toFixed(10));
    history.unshift({expr:display,result:r});
    if(history.length>20)history.pop();
    display=String(r);
    update();
    renderHist();
  } catch(e){display='Error';update();}
}

function renderHist(){
  const items=document.getElementById('histItems');
  if(history.length>0){
    document.getElementById('histWrap').style.display='block';
    items.innerHTML=history.map((h,i)=>`<div class="hist-item" onclick="useHist(${i})"><span>${h.expr}</span><span class="hist-result">= ${h.result}</span></div>`).join('');
  }
}
function useHist(i){display=String(history[i].result);expr='';update();}
function clearHist(){history=[];document.getElementById('histWrap').style.display='none';}

// Keyboard support
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9') inp(e.key);
  else if(['+','-','*','/','.','^','(',')','.'].includes(e.key)) inp(e.key);
  else if(e.key==='Enter') evaluate();
  else if(e.key==='Backspace') delLast();
  else if(e.key==='Escape') clear_all();
});
update();
</script>
