<script>
const UNITS={
  Length:{
    Meter:{base:1},Kilometer:{base:1000},Centimeter:{base:.01},Millimeter:{base:.001},
    Mile:{base:1609.344},'Yard':{base:.9144},'Foot':{base:.3048},'Inch':{base:.0254},
    'Nautical Mile':{base:1852},'Light Year':{base:9.461e15}
  },
  Weight:{
    Kilogram:{base:1},Gram:{base:.001},Milligram:{base:.000001},
    'Metric Ton':{base:1000},Pound:{base:.453592},Ounce:{base:.0283495},
    Stone:{base:6.35029},'US Ton':{base:907.185}
  },
  Temperature:{special:true},
  Area:{
    'Square Meter':{base:1},'Square Kilometer':{base:1e6},'Square Centimeter':{base:.0001},
    'Square Mile':{base:2589988},'Square Yard':{base:.836127},'Square Foot':{base:.0929},
    'Square Inch':{base:.000645},Acre:{base:4046.86},Hectare:{base:10000}
  },
  Volume:{
    Liter:{base:1},Milliliter:{base:.001},'Cubic Meter':{base:1000},'Cubic Centimeter':{base:.001},
    'US Gallon':{base:3.78541},'US Quart':{base:.946353},'US Pint':{base:.473176},
    'US Cup':{base:.24},'US Fluid Ounce':{base:.0295735},'UK Gallon':{base:4.54609}
  },
  Speed:{
    'm/s':{base:1},'km/h':{base:1/3.6},'mph':{base:.44704},'knot':{base:.514444},'ft/s':{base:.3048}
  },
  Data:{
    'Byte':{base:1},'Kilobyte':{base:1024},'Megabyte':{base:1048576},'Gigabyte':{base:1073741824},
    'Terabyte':{base:1099511627776},'Bit':{base:.125},'Kilobit':{base:128},'Megabit':{base:131072},'Gigabit':{base:134217728}
  }
};
const CATEGORIES=Object.keys(UNITS);
let currentCat=CATEGORIES[0];

function renderCatTabs(){
  const container=document.getElementById('catTabs');
  container.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-tab'+(cat===currentCat?' on':'');
    btn.textContent=cat;
    btn.onclick=()=>{currentCat=cat;renderCatTabs();renderUnits();convert(1);};
    container.appendChild(btn);
  });
}

function renderUnits(){
  const units=currentCat==='Temperature'?['Celsius','Fahrenheit','Kelvin','Rankine']:Object.keys(UNITS[currentCat]);
  ['unit1','unit2'].forEach((id,idx)=>{
    const sel=document.getElementById(id);
    sel.innerHTML='';
    units.forEach(u=>{const opt=document.createElement('option');opt.value=u;opt.textContent=u;sel.appendChild(opt);});
    sel.value=units[idx===0?0:1];
  });
  document.getElementById('val1').value=1;
}

function convertTemp(val,from,to){
  let celsius=val;
  if(from==='Fahrenheit') celsius=(val-32)*5/9;
  else if(from==='Kelvin') celsius=val-273.15;
  else if(from==='Rankine') celsius=(val-491.67)*5/9;
  if(to==='Celsius') return celsius;
  if(to==='Fahrenheit') return celsius*9/5+32;
  if(to==='Kelvin') return celsius+273.15;
  if(to==='Rankine') return(celsius+273.15)*9/5;
  return celsius;
}

function convert(from){
  const v1=parseFloat(document.getElementById('val1').value)||0;
  const v2=parseFloat(document.getElementById('val2').value)||0;
  const u1=document.getElementById('unit1').value;
  const u2=document.getElementById('unit2').value;
  let result;
  if(currentCat==='Temperature'){
    result=from===1?convertTemp(v1,u1,u2):convertTemp(v2,u2,u1);
    if(from===1) document.getElementById('val2').value=+result.toFixed(8);
    else document.getElementById('val1').value=+result.toFixed(8);
    const display=from===1?result:convertTemp(v2,u2,u1);
    document.getElementById('resultVal').textContent=`${+display.toFixed(6)} ${from===1?u2:u1}`;
    document.getElementById('resultLabel').textContent=`${from===1?v1:v2} ${from===1?u1:u2} =`;
  } else {
    const units=UNITS[currentCat];
    if(from===1){
      const base=v1*units[u1].base;
      result=base/units[u2].base;
      document.getElementById('val2').value=+result.toFixed(10);
    } else {
      const base=v2*units[u2].base;
      result=base/units[u1].base;
      document.getElementById('val1').value=+result.toFixed(10);
    }
    document.getElementById('resultVal').textContent=`${+result.toFixed(8)} ${from===1?u2:u1}`;
    document.getElementById('resultLabel').textContent=`${from===1?v1:v2} ${from===1?u1:u2} =`;
  }
  buildRefTable();
}

function swap(){
  const u1=document.getElementById('unit1').value;
  const u2=document.getElementById('unit2').value;
  document.getElementById('unit1').value=u2;
  document.getElementById('unit2').value=u1;
  convert(1);
}

function buildRefTable(){
  const u1=document.getElementById('unit1').value;
  const u2=document.getElementById('unit2').value;
  const vals=[0.001,0.01,0.1,1,5,10,50,100,500,1000];
  const tbody=document.getElementById('refTable');
  tbody.innerHTML='';
  document.getElementById('refH1').textContent=u1;
  document.getElementById('refH2').textContent=u2;
  vals.forEach(v=>{
    let res;
    if(currentCat==='Temperature') res=convertTemp(v,u1,u2);
    else{const units=UNITS[currentCat];res=v*units[u1].base/units[u2].base;}
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${v}</td><td style="color:var(--accent);font-weight:500">${+res.toFixed(8)}</td><td>${u2}</td>`;
    tbody.appendChild(tr);
  });
}

renderCatTabs();renderUnits();convert(1);
</script>
